name: PetRecovery
options:
  bundleIdPrefix: com.petrecovery
  # navigationDestination(isPresented:)/(for:) are iOS 16+ APIs the app
  # relies on for QR-scan/deep-link navigation — don't lower this without
  # refactoring that navigation first.
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

packages:
  Stripe:
    url: https://github.com/stripe/stripe-ios-spm
    from: 23.18.0

targets:
  PetRecovery:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: App
      - path: Models
      - path: Services
      - path: Views
    info:
      # xcodegen regenerates Info.plist wholesale from this block on every
      # `xcodegen generate` — hand-edits to the generated file are silently
      # wiped. Add new keys here, not in Info.plist directly.
      path: Info.plist
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: "PetRecovery uses your camera to scan QR codes on pet tags."
        NSLocationWhenInUseUsageDescription: "PetRecovery uses your location to search for lost pets nearby and verify reward proximity during reunions."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - petrecovery
    entitlements:
      path: PetRecovery.entitlements
      properties:
        aps-environment: development
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.petrecovery.app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.petrecovery.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    dependencies:
      # Adjust the product name to whichever Stripe module you actually
      # use — StripePaymentSheet covers the escrow/reward payment flow;
      # swap or add StripePayments / StripeApplePay if needed.
      - package: Stripe
        product: StripePaymentSheet
    capabilities:
      - PushNotifications
      - InAppPurchase
      - Keychain

  PetRecoveryTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: PetRecoveryTests
    dependencies:
      - target: PetRecovery

schemes:
  PetRecovery:
    build:
      targets:
        PetRecovery: all
        PetRecoveryTests: [test]
    test:
      targets:
        - PetRecoveryTests
    run:
      config: Debug
    archive:
      config: Release
