services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: petrecovery
      POSTGRES_PASSWORD: petrecovery
      POSTGRES_DB: petrecovery
    ports:
      - "5432:5432"
    volumes:
      - petrecovery_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petrecovery"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - petrecovery_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  petrecovery_postgres_data:
  petrecovery_redis_data:
